<!--
Name: login.html
Authors: Jack Morice, Nick Greico, Alex Carrillo, Gunther Luechtefield
Description: This file contains the HTML template for the login page of the Enclav3 application.
It defines the structure and layout of the login page, including a form for entering the master password.
Inputs: Master password
Outputs: Rendered HTML page for login, redirect to main page on successful login, and error message if password is incorrect
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Enclav3 Master Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
<script>
  (function() {
    var t = localStorage.getItem('enclav3_theme') || 'dark';
    var a = localStorage.getItem('enclav3_accent') || '#8ceabb';
    var ad = localStorage.getItem('enclav3_accent_dark') || '#378f7b';
    var ts = localStorage.getItem('enclav3_text_size') || '16px'; 
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-dark', ad);
    document.documentElement.style.setProperty('--text-size', ts);
  })();
</script>
</head>

<body class="align">

  <div class="grid">
    <div class="register">

      <div class="brand">Enclav3</div>
      <div class="subtitle">User: <strong>{{ username }}</strong></div>

      <form class="form" method="POST" action="/login">
        <div class="form__field">
          <input type="password" name="master_password" placeholder="Master password" required />
        </div>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <div class="form__field">
          <input type="submit" value="Unlock" />
        </div>
      </form>
      <a href="/switch-user" class="secondary" style="margin-top: 10px; display: block;">Switch user</a>

    </div>
  </div>

</body>
</html>
