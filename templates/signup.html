<!--
Name: signup.html
Authors: Jack Morice, Nick Grieco, Gunther Luechtefield
Description: This file contains the HTML template for the signup page of the Enclav3 application.
It defines the structure and layout of the signup page, including a form for creating a master password.
Inputs: Master password and password confirmation
Outputs: Rendered HTML page for signup, redirect back to login page on successful signup, and error message if passwords do not match
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Create Master Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
<script>
  (function() {
    var t = localStorage.getItem('enclav3_theme') || 'dark';
    var a = localStorage.getItem('enclav3_accent') || '#8ceabb';
    var ad = localStorage.getItem('enclav3_accent_dark') || '#378f7b';
    var ts = localStorage.getItem('enclav3_text_size') || '16px'; 
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-dark', ad);
    document.documentElement.style.setProperty('--text-size', ts); 
  })();
</script>
</head>

<body class="align">

	<div class="grid">
		<div class="register">

			<div class="brand">Enclav3</div>
			<div class="subtitle">User: <strong>{{ username }}</strong></div>
			<div class="subtitle" style="font-size: 14px; margin-bottom: 10px;">Create your master password</div>

			<form class="form" method="POST" action="/signup">
				<div class="form__field">
					<input type="password" name="master_password" id="master_password" placeholder="Master password" required />
				</div>

				<!-- Live requirements checklist -->
				<div class="req_list" id="req_list">
					<div class="req" id="req_length">✗ At least 12 characters</div>
					<div class="req" id="req_upper">✗ One uppercase letter</div>
					<div class="req" id="req_lower">✗ One lowercase letter</div>
					<div class="req" id="req_number">✗ One number</div>
					<div class="req" id="req_special">✗ One special character</div>
				</div>

				<div class="form__field">
					<input type="password" name="confirm_master_password" placeholder="Confirm master password" required />
				</div>
				<div class="form__field">
					<input type="submit" value="Create" />
				</div>
			</form>

			{% if error %}
				<div class="error">{{ error }}</div>
			{% endif %}

			<a href="/switch-user" class="secondary">Back to user selection</a>

		</div>
	</div>

<style>
.req_list {
	text-align: left;
	margin: -0.5rem 0 1rem 0;
	padding: 0.75rem 1rem;
	border-radius: 10px;
	border: 1px solid var(--border-color);
	background: var(--bg-card-subtle, rgba(255,255,255,0.03));
	display: flex;
	flex-direction: column;
	gap: 0.3rem;
}
.req {
	font-size: 12px;
	color: var(--text-secondary);
	transition: color 0.2s ease;
}
.req.met {
	color: var(--accent);
}
</style>

<script>
const input = document.getElementById("master_password");
const checks = {
	req_length:  p => p.length >= 12,
	req_upper:   p => /[A-Z]/.test(p),
	req_lower:   p => /[a-z]/.test(p),
	req_number:  p => /[0-9]/.test(p),
	req_special: p => /[!@#$%^&*()\-_=+\[\]{}|;':",./<>?]/.test(p),
};
const labels = {
	req_length:  ["✗ At least 12 characters",  "✓ At least 12 characters"],
	req_upper:   ["✗ One uppercase letter",     "✓ One uppercase letter"],
	req_lower:   ["✗ One lowercase letter",     "✓ One lowercase letter"],
	req_number:  ["✗ One number",               "✓ One number"],
	req_special: ["✗ One special character",    "✓ One special character"],
};
input.addEventListener("input", () => {
	const p = input.value;
	for (const [id, fn] of Object.entries(checks)) {
		const el = document.getElementById(id);
		const met = fn(p);
		el.textContent = labels[id][met ? 1 : 0];
		el.classList.toggle("met", met);
	}
});
</script>

</body>
</html>
