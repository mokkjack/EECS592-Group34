<!--
Name: create_user.html
Description: This file contains the HTML template for creating a new user.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Enclav3 - Create User</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
<script>
  (function() {
    var t = localStorage.getItem('enclav3_theme') || 'dark';
    var a = localStorage.getItem('enclav3_accent') || '#8ceabb';
    var ad = localStorage.getItem('enclav3_accent_dark') || '#378f7b';
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-dark', ad);
  })();
</script>
</head>

<body class="align">

  <div class="grid">
    <div class="register">

      <div class="brand">Enclav3</div>
      <div class="subtitle">Create a new user</div>

      <form class="form" method="POST" action="/create-user">
        <div class="form__field">
          <input type="text" name="username" placeholder="Username" required />
        </div>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <div class="form__field">
          <input type="submit" value="Create User" />
        </div>
      </form>

      <a href="/" class="secondary">Back to user selection</a>

    </div>
  </div>

</body>
</html>
